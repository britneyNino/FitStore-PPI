<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitStore - Tienda de Gym</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-icon">💪</span>
      <span class="brand-text">FitStore</span>
    </div>

    <div class="nav-links">
      <button class="nav-btn active" onclick="mostrarVista('catalogo')">
        Catalogo
      </button>

      <button class="nav-btn" onclick="mostrarVista('mis-pedidos')">
        Mis Pedidos
      </button>

      <button
        class="nav-btn admin-btn"
        onclick="mostrarVista('admin')"
        id="btnAdmin"
        style="display:none"
      >
        Admin
      </button>
    </div>

    <div class="nav-right">
      <button class="carrito-btn" onclick="toggleCarrito()">
        🛒 <span id="carritoCount">0</span>
      </button>

      <div id="userInfo" style="display:none" class="user-info">
        <span id="userName"></span>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>

      <button
        id="btnLogin"
        class="btn-primary"
        onclick="mostrarVista('login')"
      >
        Iniciar sesion
      </button>
    </div>
  </nav>

  <div id="vista-login" class="vista" style="display:none">
    <div class="auth-container">

      <h2>Iniciar Sesion</h2>

      <div class="form-group">
        <label>Correo electronico</label>
        <input
          type="email"
          id="loginEmail"
          placeholder="tu@email.com"
        >
      </div>

      <div class="form-group">
        <label>Contrasena</label>
        <input
          type="password"
          id="loginClave"
          placeholder="••••••••"
        >
      </div>

      <button class="btn-primary btn-full" onclick="login()">
        Entrar
      </button>

      <p id="loginError" class="error-msg"></p>

      <p class="auth-hint">
        Cliente: <code>juan@email.com / clave123</code><br>
        Admin: <code>admin@fitstore.com / admin123</code>
      </p>

    </div>
  </div>

  <div id="vista-catalogo" class="vista">

    <div class="catalogo-header">

      <h1>Nuestros Productos</h1>

      <div class="filtros">
        <button class="filtro-btn active" onclick="filtrar('todos', this)">
          Todos
        </button>

        <button class="filtro-btn" onclick="filtrar('SUPLEMENTO', this)">
          Suplementos
        </button>

        <button class="filtro-btn" onclick="filtrar('EQUIPO', this)">
          Equipos
        </button>

        <button class="filtro-btn" onclick="filtrar('ROPA', this)">
          Ropa
        </button>
      </div>

      <input
        type="text"
        id="buscador"
        class="buscador"
        placeholder="🔍 Buscar producto..."
        oninput="buscar()"
      >

    </div>

    <div id="gridProductos" class="grid-productos"></div>

  </div>

  <div id="vista-mis-pedidos" class="vista" style="display:none">
    <div class="section-header">
      <h2>Mis Pedidos</h2>
    </div>

    <div id="listaPedidos" class="lista-pedidos"></div>
  </div>

  <div id="vista-admin" class="vista" style="display:none">
    <div class="section-header">
      <h2>Panel de Administrador</h2>
    </div>

    <div id="tablaAdmin"></div>
  </div>

  <div id="carritoPanel" class="carrito-panel" style="display:none">

    <div class="carrito-header">
      <h3>🛒 Carrito</h3>

      <button onclick="toggleCarrito()" class="carrito-close">
        ✕
      </button>
    </div>

    <div id="carritoItems" class="carrito-items"></div>

    <div class="carrito-footer">

      <div class="carrito-total">
        Total: <strong id="carritoTotal">$0</strong>
      </div>

      <button
        class="btn-primary btn-full"
        onclick="confirmarCompra()"
        id="btnComprar"
        disabled
      >
        Confirmar compra
      </button>

    </div>

  </div>

  <div
    id="overlay"
    class="overlay"
    style="display:none"
    onclick="toggleCarrito()"
  ></div>

  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>

</body>
</html>
